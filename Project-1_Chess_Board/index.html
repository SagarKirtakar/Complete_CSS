<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Chess Board</title>

    <!-- External CSS file -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Main chess board container -->
    <div id="chess-board-container">

        <!-- Row 1 : White Major Pieces -->
        <div class="row">
            <div class="box2">&#9814;</div> <!-- White Rook -->
            <div class="box1">&#9816;</div> <!-- White Knight -->
            <div class="box2">&#9815;</div> <!-- White Bishop -->
            <div class="box1">&#9813;</div> <!-- White Queen -->
            <div class="box2">&#9812;</div> <!-- White King -->
            <div class="box1">&#9815;</div> <!-- White Bishop -->
            <div class="box2">&#9816;</div> <!-- White Knight -->
            <div class="box1">&#9814;</div> <!-- White Rook -->
        </div>

        <!-- Row 2 : White Pawns -->
        <div class="row">
            <div class="box1">&#9817;</div>
            <div class="box2">&#9817;</div>
            <div class="box1">&#9817;</div>
            <div class="box2">&#9817;</div>
            <div class="box1">&#9817;</div>
            <div class="box2">&#9817;</div>
            <div class="box1">&#9817;</div>
            <div class="box2">&#9817;</div>
        </div>

        <!-- Row 3 : Empty Squares -->
        <div class="row">
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
        </div>

        <!-- Row 4 : Empty Squares -->
        <div class="row">
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
        </div>

        <!-- Row 5 : Empty Squares -->
        <div class="row">
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
        </div>

        <!-- Row 6 : Empty Squares -->
        <div class="row">
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box1"></div>
            <div class="box2"></div>
        </div>

        <!-- Row 7 : Black Pawns -->
        <div class="row">
            <div class="box2">&#9823;</div>
            <div class="box1">&#9823;</div>
            <div class="box2">&#9823;</div>
            <div class="box1">&#9823;</div>
            <div class="box2">&#9823;</div>
            <div class="box1">&#9823;</div>
            <div class="box2">&#9823;</div>
            <div class="box1">&#9823;</div>
        </div>

        <!-- Row 8 : Black Major Pieces -->
        <div class="row">
            <div class="box1">&#9820;</div> <!-- Black Rook -->
            <div class="box2">&#9822;</div> <!-- Black Knight -->
            <div class="box1">&#9821;</div> <!-- Black Bishop -->
            <div class="box2">&#9819;</div> <!-- Black Queen -->
            <div class="box1">&#9818;</div> <!-- Black King -->
            <div class="box2">&#9821;</div> <!-- Black Bishop -->
            <div class="box1">&#9822;</div> <!-- Black Knight -->
            <div class="box2">&#9820;</div> <!-- Black Rook -->
        </div>

    </div>

</body>
</html>
